<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월출어람 중복 기사 정리 도구 | 관리자 전용</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const FC = {
  apiKey:"AIzaSyDixmWj8Ah9vzACGZ6DfL5hAP9sC-H-5Ig",
  authDomain:"jjjj-6742.firebaseapp.com",
  projectId:"jjjj-6742",
  storageBucket:"jjjj-6742.firebasestorage.app",
  messagingSenderId:"61243262608",
  appId:"1:61243262608:web:5e9139eb2345fbaf01fa15"
};
try{
  const app=initializeApp(FC);
  window.__db=getFirestore(app);
  window.__fs={collection,getDocs,addDoc,deleteDoc,doc};
  window.__ready&&window.__ready();
}catch(e){alert("Firebase 초기화 오류: "+e.message);}
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;background:#f4f6f4;color:#1a1a1a;line-height:1.7}
.wrap{max-width:1000px;margin:0 auto;padding:28px 20px 80px}
h1{font-size:1.3rem;color:#1b4332;margin-bottom:6px}
.sub{font-size:.85rem;color:#555;margin-bottom:18px}
.panel{background:#fff;border:1px solid #e0e5e0;border-radius:12px;padding:20px;margin-bottom:16px}
button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;padding:11px 18px;font-size:.88rem;font-weight:700}
.b-main{background:#1b4332;color:#fff}.b-sub{background:#e8f0ea;color:#1b4332}
.b-warn{background:#b3261e;color:#fff}
button:disabled{opacity:.45;cursor:not-allowed}
.btns{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
#status{font-size:.85rem;padding:12px 14px;border-radius:8px;background:#eef4ee;color:#1b4332;white-space:pre-line;min-height:44px}
#status.err{background:#fdecea;color:#b3261e}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th,td{border-bottom:1px solid #eee;padding:8px 6px;text-align:left;vertical-align:middle}
th{background:#f4f8f4;color:#1b4332;font-size:.78rem}
tr.old{background:#fff6f5}
.tag{display:inline-block;background:#d8f3dc;color:#1b4332;border-radius:12px;padding:1px 10px;font-size:.72rem;font-weight:700;white-space:nowrap}
.mark-old{color:#b3261e;font-weight:700;font-size:.72rem}
.mark-new{color:#2d6a4f;font-weight:700;font-size:.72rem}
.note{font-size:.78rem;color:#8a6d00;background:#fff8e1;border:1px solid #f3e2a0;border-radius:8px;padding:10px 12px;margin-top:12px}
input[type=checkbox]{width:17px;height:17px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🧹 월출어람 중복 기사 정리 도구</h1>
  <div class="sub">웹진 데이터베이스에서 <b>구버전 샘플 기사(사진 없음)</b>를 골라 삭제합니다.<br>
  삭제하면 웹진과 관리자 페이지에 동시 반영됩니다. 관리자 페이지에서 삭제가 안 될 때 이 도구를 사용하세요.</div>

  <div class="panel">
    <div class="btns">
      <button class="b-sub" id="btnLoad">🔍 기사 불러오기</button>
      <button class="b-sub" id="btnAuto" disabled>☑️ 구버전 자동 선택</button>
      <button class="b-warn" id="btnDel" disabled>🗑 선택한 기사 삭제</button>
      <button class="b-main" id="btnFoot" disabled style="display:none">📸 발자취 사진 버전 등록</button>
    </div>
    <div id="status">먼저 [기사 불러오기]를 눌러주세요.</div>
    <div class="note">💡 <b>발자취</b> 기사는 구버전과 신버전 제목이 같아 사진 버전이 등록되지 않았습니다.<br>
    구버전 발자취를 삭제하면 [발자취 사진 버전 등록] 버튼이 나타납니다 — 눌러서 교체를 완료하세요.</div>
  </div>

  <div class="panel">
    <table id="tbl"><thead><tr>
      <th style="width:34px"><input type="checkbox" id="chkAll"></th>
      <th style="width:80px">분류</th><th>제목</th><th style="width:88px">날짜</th>
      <th style="width:56px">사진</th><th style="width:70px">구분</th>
    </tr></thead><tbody><tr><td colspan="6" style="color:#999;text-align:center;padding:20px">기사를 불러오면 여기에 표시됩니다</td></tr></tbody></table>
  </div>
</div>

<script>
const OLD_TITLES = ["함께해 주셔서 감사합니다 — 관장 김철진", "2026년 상반기 함께 걸어온 복지관 발자취", "찾아가는 시무식 — 지역사회와 더욱 가까이", "함께여서 더 즐거운 겨울방학 — 계절학교", "전남 장애인 체력인증검사 — 든든한 건강관리", "명절맞이 특식 — 설맞이 사랑의 떡국 나눔", "이용인 간담회 — 여러분의 소중한 목소리를 듣습니다", "왕인문화축제 부스 운영 — 지역사회와 함께", "자기결정프로그램 모의투표 — 스스로 선택하는 힘", "이침봉사 & 헌혈 — 세한대학교와 함께하는 나눔", "어버이날 행사 — 사랑해孝 감사해孝", "발달장애인 자조모임 목포 나들이 — 별빛소원", "갈이 가영 장애인자원봉사단 — 영암 곳곳에 따뜻한 손길", "약바르게 쓰기 교육 — 건강관리교육 실시", "지역사회공헌활동 — 바리스타 강사지원, 세계여성의날, 국가유공자 방문", "2026 청년포럼 청년주도 개선활동 지원사업 선정", "2026년도 온 누리 열효율 개선사업 선정", "2026년도 저소득 장애인 우체국 암보험 지원사업 선정", "2026년도 장애성인 평생교육프로그램 — 국립목포대학교 협력", "2026년도 에너지취약계층 냉방물품 지원사업 선정", "\"더 안전하고 문턱 없는 복지관으로\" — HD현대삼호 후원", "영암군장애인종합복지관 네트워크 현황 — 상반기 업무협약", "장애인인권교육아카데미 — 나의 권리, 당당하게"];
const FOOT_NEW = {"cat": "발자취", "emoji": "🗓️", "featured": false, "date": "2026-07-01", "author": "기획홍보팀", "title": "2026년 상반기 함께 걸어온 복지관 발자취", "summary": "찾아가는 시무식부터 장애인인권교육아카데미까지 — 2026년 상반기 영암군장애인종합복지관의 주요 활동을 사진과 함께 한눈에 돌아봅니다.", "content": "<img src=\"images/vol3/footprints-01.jpg\" alt=\"\" loading=\"lazy\"><img src=\"images/vol3/footprints-02.jpg\" alt=\"\" loading=\"lazy\"><img src=\"images/vol3/footprints-03.jpg\" alt=\"\" loading=\"lazy\"><img src=\"images/vol3/footprints-04.jpg\" alt=\"\" loading=\"lazy\"><img src=\"images/vol3/footprints-05.jpg\" alt=\"\" loading=\"lazy\"><img src=\"images/vol3/footprints-06.jpg\" alt=\"\" loading=\"lazy\"><img src=\"images/vol3/footprints-07.jpg\" alt=\"\" loading=\"lazy\"><p><strong>1월:</strong> 1/2 찾아가는 시무식</p><p><strong>2월:</strong> 2월 계절학교 / 2/4 장애인체력인증검사 / 2/12 이용인 간담회 / 2/13 명절맞이 떡국 및 장어 특식</p><p><strong>3월:</strong> 3/6 세계여성의날 행사 / 3/20 같이가영 거리캠페인 / 3/20 보조기기서비스</p><p><strong>4월:</strong> 4/3~4/8 왕인문화축제 부스운영 / 4/10 너는나의봄이다 / 4/17 장애인 체육대회 시상식 / 4/20 장애인의 날 행사</p><p><strong>5월:</strong> 5/8 어버이날 행사 / 5/15 자조모임 목포나들이 / 5/18 영다락방 / 5/22 같이가영 연탄배달 자원봉사</p><p><strong>6월:</strong> 6/1 같이가영 참전용사 나눔 / 6/2 우리가족 사진공모전 시상식 / 6/10 약바르게 쓰기 교육 / 6/29~30 장애인인권교육아카데미</p>"};
let LIST = [];

const gi=id=>document.getElementById(id);
const setStatus=(m,err)=>{const s=gi('status');s.textContent=m;s.className=err?'err':'';};
const photoCount=c=>(c.match(/<img/g)||[]).length;
const isOld=a=>OLD_TITLES.includes((a.title||'').trim());

function renderTable(){
  const tb=document.querySelector('#tbl tbody');
  if(!LIST.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;color:#999;padding:20px">기사 없음</td></tr>';return;}
  tb.innerHTML=LIST.map((a,i)=>{
    const old=isOld(a), n=photoCount(a.content||'');
    return '<tr class="'+(old?'old':'')+'">'
      +'<td><input type="checkbox" class="rowchk" data-i="'+i+'"'+(old?' checked':'')+'></td>'
      +'<td><span class="tag">'+(a.cat||'')+'</span></td>'
      +'<td>'+(a.emoji||'')+' '+(a.title||'(제목 없음)')+'</td>'
      +'<td>'+(a.date||'')+'</td><td>'+n+'장</td>'
      +'<td>'+(old?'<span class="mark-old">구버전</span>':'<span class="mark-new">유지</span>')+'</td></tr>';
  }).join('');
  updateDelBtn();
  document.querySelectorAll('.rowchk').forEach(c=>c.onchange=updateDelBtn);
}
function updateDelBtn(){
  const n=document.querySelectorAll('.rowchk:checked').length;
  gi('btnDel').disabled=n===0;
  gi('btnDel').textContent='🗑 선택한 기사 삭제 ('+n+'건)';
}

async function load(){
  setStatus('불러오는 중...');
  try{
    const {collection,getDocs}=window.__fs;
    const snap=await getDocs(collection(window.__db,'articles'));
    LIST=[]; snap.forEach(d=>LIST.push({id:d.id,...d.data()}));
    LIST.sort((a,b)=>(a.title||'').localeCompare(b.title||''));
    renderTable();
    const oldN=LIST.filter(isOld).length;
    const footOldGone=!LIST.some(a=>(a.title||'').trim()===FOOT_NEW.title&&photoCount(a.content||'')===0);
    const footNewExists=LIST.some(a=>(a.title||'').trim()===FOOT_NEW.title&&photoCount(a.content||'')>0);
    gi('btnFoot').style.display=(footOldGone&&!footNewExists)?'':'none';
    gi('btnFoot').disabled=!(footOldGone&&!footNewExists);
    setStatus('✅ 총 '+LIST.length+'건 불러옴 / 구버전(빨간 배경) '+oldN+'건 자동 선택됨\n표를 확인하고 필요하면 체크를 조정한 뒤 삭제하세요.');
    gi('btnAuto').disabled=false;
  }catch(e){setStatus('❌ 불러오기 실패: '+e.message,true);}
}

function autoSelect(){
  document.querySelectorAll('.rowchk').forEach(c=>{c.checked=isOld(LIST[+c.dataset.i]);});
  updateDelBtn();
}

async function del(){
  const sel=[...document.querySelectorAll('.rowchk:checked')].map(c=>LIST[+c.dataset.i]);
  if(!sel.length)return;
  if(!confirm(sel.length+'건을 삭제합니다. 되돌릴 수 없습니다. 진행할까요?\n\n'+sel.slice(0,5).map(a=>'· '+a.title).join('\n')+(sel.length>5?'\n…외 '+(sel.length-5)+'건':'')))return;
  gi('btnDel').disabled=true;
  const {deleteDoc,doc}=window.__fs;
  let ok=0,fail=0,firstErr='';
  for(let i=0;i<sel.length;i++){
    try{await deleteDoc(doc(window.__db,'articles',String(sel[i].id)));ok++;}
    catch(e){fail++;if(!firstErr)firstErr=e.message;}
    setStatus('삭제 중... '+(i+1)+'/'+sel.length);
  }
  setStatus((fail?'⚠️':'🎉')+' 삭제 완료: 성공 '+ok+'건 / 실패 '+fail+'건'
    +(fail?'\n오류: '+firstErr+'\n(permission 오류라면 Firebase 보안규칙에서 delete가 막혀 있는 것입니다 — 알려주세요)':'')
    +'\n목록을 새로 불러옵니다...', fail>0);
  await load();
}

async function addFoot(){
  if(!confirm('사진이 포함된 발자취 기사를 등록할까요?'))return;
  try{
    const {collection,addDoc}=window.__fs;
    await addDoc(collection(window.__db,'articles'),FOOT_NEW);
    setStatus('🎉 발자취 사진 버전 등록 완료! 목록을 새로 불러옵니다...');
    await load();
  }catch(e){setStatus('❌ 등록 실패: '+e.message,true);}
}

gi('btnLoad').onclick=load;
gi('btnAuto').onclick=autoSelect;
gi('btnDel').onclick=del;
gi('btnFoot').onclick=addFoot;
gi('chkAll').onchange=e=>{document.querySelectorAll('.rowchk').forEach(c=>c.checked=e.target.checked);updateDelBtn();};
window.__ready=()=>setStatus('Firebase 준비 완료. [기사 불러오기]를 눌러주세요.');
</script>
</body>
</html>
